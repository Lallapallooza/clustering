name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs toolchain (required by doxygen-build pre-commit hook)
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz cmake ninja-build
      - name: Install Doxygen 1.16.1
        run: |
          curl -fsSL -o /tmp/doxygen.tar.gz \
            https://www.doxygen.nl/files/doxygen-1.16.1.linux.bin.tar.gz
          tar -xzf /tmp/doxygen.tar.gz -C /tmp
          sudo install -m 0755 /tmp/doxygen-1.16.1/bin/doxygen /usr/local/bin/doxygen
          doxygen --version
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-18 clang-tidy-18 libstdc++-13-dev
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-18 100
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++-18 -DCLUSTERING_ENABLE_CLANG_TIDY=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
