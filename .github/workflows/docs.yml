name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Graphviz + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz cmake ninja-build
      - name: Install Doxygen 1.16.1
        run: |
          curl -fsSL -o /tmp/doxygen.tar.gz \
            https://www.doxygen.nl/files/doxygen-1.16.1.linux.bin.tar.gz
          tar -xzf /tmp/doxygen.tar.gz -C /tmp
          sudo install -m 0755 /tmp/doxygen-1.16.1/bin/doxygen /usr/local/bin/doxygen
          doxygen --version
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCLUSTERING_BUILD_DOCS=ON -DCLUSTERING_BUILD_TESTS=OFF -DCLUSTERING_BUILD_BENCHMARK=OFF
      - name: Build docs
        run: cmake --build build --target docs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/html

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
